      <stop offset="0%" stop-color="#1E293B"/>
      <stop offset="100%" stop-color="#0B1120"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.35" r="0.45">
      <stop offset="0%" stop-color="#3B82F6" stop-opacity="0.12"/>
